version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: blood_warriors_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blood_warriors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blood_warriors"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blood_warriors_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: blood_warriors_backend
    volumes:
      - ./backend/app:/workspace/app
      - ./Dataset.csv:/workspace/Dataset.csv
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/blood_warriors
      - SYNC_DATABASE_URL=postgresql+psycopg2://postgres:password@db:5432/blood_warriors
      - REDIS_URL=redis://redis:6379/0
      - AWS_DEFAULT_REGION=us-east-1
      - USE_LOCAL_MOCKS=TRUE
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: blood_warriors_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
